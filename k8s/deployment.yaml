apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops
  labels:
    app: devops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
      - name: devops
        image: ghcr.io/YOUR_GITHUB_USERNAME/devops:IMAGE_TAG
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: db-service
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: password
        - name: RAILS_ENV
          value: production
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-service
spec:
  selector:
    app: devops
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
